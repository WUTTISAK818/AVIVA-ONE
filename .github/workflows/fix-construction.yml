name: Restore construction page from feature branch
on:
  workflow_dispatch:
jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy complete construction/page.tsx from feature branch
        run: |
          git fetch origin claude/move-work-location-2CfBA
          git checkout origin/claude/move-work-location-2CfBA -- src/app/construction/page.tsx
      - name: Commit and push
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add src/app/construction/page.tsx
          git diff --cached --quiet && echo 'No changes' || git commit -m "fix(v4.34): Phase 3 — race condition guard, useMemo (construction)"
          git push origin main
