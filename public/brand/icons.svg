<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- ใช้แบบ: <svg><use href="/brand/icons.svg#ic-win"/></svg> -->

  <!-- ===== สถานะโอกาสชนะ ===== -->
  <symbol id="ic-win" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#4ADE80"/><path d="M7.5 12.5l3 3 6-7" fill="none" stroke="#0D1F1B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="ic-tossup" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FACC15"/><path d="M12 7v6" stroke="#0D1F1B" stroke-width="2.4" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1.3" fill="#0D1F1B"/></symbol>
  <symbol id="ic-risk" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#F87171"/><path d="M12 7v6" stroke="#0D1F1B" stroke-width="2.4" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1.3" fill="#0D1F1B"/></symbol>

  <!-- ===== วิธีเก็บข้อมูล (badge ทอง) ===== -->
  <symbol id="ic-chip" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="none" stroke="#D4AF37" stroke-width="2"/><rect x="10" y="10" width="4" height="4" fill="#D4AF37"/><path d="M9 3v3M15 3v3M9 18v3M15 18v3M3 9h3M3 15h3M18 9h3M18 15h3" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/></symbol>
  <symbol id="ic-photo" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2.5" fill="none" stroke="#D4AF37" stroke-width="2"/><path d="M8 7l1.5-2.5h5L16 7" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="13.5" r="3.2" fill="none" stroke="#D4AF37" stroke-width="2"/></symbol>
  <symbol id="ic-manual" viewBox="0 0 24 24"><path d="M4 20l4-1 10-10-3-3L5 16l-1 4z" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linejoin="round"/><path d="M14 6l3 3" stroke="#D4AF37" stroke-width="2"/></symbol>

  <!-- ===== เจตนา ===== -->
  <symbol id="ic-intent-confirmed" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#4ADE80" stroke-width="2"/><path d="M8 12.5l2.5 2.5 5-5.5" fill="none" stroke="#4ADE80" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="ic-intent-pending" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#9CA3AF" stroke-width="2"/><path d="M12 8v4.5l3 2" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="ic-intent-rejected" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#F87171" stroke-width="2"/><path d="M9 9l6 6M15 9l-6 6" stroke="#F87171" stroke-width="2.2" stroke-linecap="round"/></symbol>

  <!-- ===== เทียบบัญชี ===== -->
  <symbol id="ic-roll-in" viewBox="0 0 24 24"><path d="M12 21s7-6.2 7-11a7 7 0 10-14 0c0 4.8 7 11 7 11z" fill="none" stroke="#4ADE80" stroke-width="2" stroke-linejoin="round"/><path d="M9 10l2 2 4-4.5" fill="none" stroke="#4ADE80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="ic-roll-other" viewBox="0 0 24 24"><path d="M12 21s7-6.2 7-11a7 7 0 10-14 0c0 4.8 7 11 7 11z" fill="none" stroke="#FACC15" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="10" r="2" fill="#FACC15"/></symbol>
  <symbol id="ic-roll-notfound" viewBox="0 0 24 24"><path d="M12 21s7-6.2 7-11a7 7 0 10-14 0c0 4.8 7 11 7 11z" fill="none" stroke="#F87171" stroke-width="2" stroke-linejoin="round"/><path d="M10 8l4 4M14 8l-4 4" stroke="#F87171" stroke-width="2" stroke-linecap="round"/></symbol>
</svg>
