  </defs>
  <!-- seal rings -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
  <circle cx="60" cy="60" r="47" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.55"/>
